{% extends "base.html" %}

{% block title %}{% if mode == 'add' %}Добавить документ{% else %}Редактировать документ{% endif %}{% endblock %}

{% block content %}
    <div class="card">
        <h2>{% if mode == 'add' %}Добавить документ{% else %}Редактировать документ{% endif %}</h2>

        <form method="POST">
            <div class="form-group">
                <label for="type_id">Тип документа *</label>
                <select id="type_id" name="type_id" required>
                    {% for t in doc_types %}
                        <option value="{{ t.type_id }}" {% if document and document.type_id == t.type_id %}selected{% endif %}>{{ t.type_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="document_name">Название документа *</label>
                <input type="text" id="document_name" name="document_name" value="{{ document.document_name if document else '' }}" required>
            </div>

            <div class="form-group">
                <label for="file_path">Путь к файлу *</label>
                <input type="text" id="file_path" name="file_path" value="{{ document.file_path if document else '' }}" required>
            </div>

            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{{ url_for('case_details', case_id=case.case_id) }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
{% endblock %}
