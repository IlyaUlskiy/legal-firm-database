{% extends "base.html" %}

{% block title %}{% if mode == 'add' %}Добавить клиента{% else %}Редактировать клиента{% endif %}{% endblock %}

{% block content %}
    <div class="card">
        <h2>{% if mode == 'add' %}Добавить клиента{% else %}Редактировать клиента{% endif %}</h2>

        <form method="POST">
            <div class="form-group">
                <label for="full_name">ФИО *</label>
                <input type="text" id="full_name" name="full_name" value="{{ client.full_name if client else '' }}" required>
            </div>

            <div class="form-group">
                <label for="phone">Телефон *</label>
                <input type="tel" id="phone" name="phone" value="{{ client.phone if client else '' }}" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ client.email if client else '' }}">
            </div>

            <div class="form-group">
                <label for="passport_data">Паспортные данные *</label>
                <textarea id="passport_data" name="passport_data" rows="3" required>{{ client.passport_data if client else '' }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{{ url_for('clients') }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
{% endblock %}
